<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1280 420">
  <title id="title">Yu Sun profile header</title>
  <desc id="desc">A Rust-centered engineering map across industrial systems, bioinformatics research, financial engineering, and open source.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070a12"/>
      <stop offset="0.52" stop-color="#101226"/>
      <stop offset="1" stop-color="#071719"/>
    </linearGradient>
    <linearGradient id="rustCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb15f"/>
      <stop offset="0.55" stop-color="#f97316"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="bioGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3cffba"/>
      <stop offset="1" stop-color="#36c5ff"/>
    </linearGradient>
    <linearGradient id="financeGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#facc15"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="systemsGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#26314f" stroke-width="1" opacity="0.35"/>
    </pattern>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 0H8" stroke="#ffffff" stroke-width="1" opacity="0.035"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #94a3b8; }
      .label { fill: #e5e7eb; font-size: 18px; font-weight: 700; letter-spacing: 0; }
      .small { fill: #cbd5e1; font-size: 15px; letter-spacing: 0; }
      .tiny { fill: #94a3b8; font-size: 13px; letter-spacing: 0; }
      .node { fill: #0f172a; stroke: #38bdf8; stroke-width: 1.4; }
      .trace { fill: none; stroke-width: 1.4; opacity: 0.62; }
    </style>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#grid)"/>
  <rect width="1280" height="420" fill="url(#scan)"/>

  <path d="M90 328 C230 230 330 265 470 205 C585 155 705 155 815 205 C965 274 1060 214 1192 94" class="trace" stroke="#38bdf8"/>
  <path d="M96 90 C245 164 315 124 453 174 C610 231 752 224 895 166 C1018 116 1098 142 1190 196" class="trace" stroke="#8b5cf6"/>
  <path d="M220 360 C340 323 426 320 548 281 C667 242 766 280 870 313 C970 344 1054 328 1176 292" class="trace" stroke="#22c55e"/>

  <g opacity="0.22">
    <circle cx="114" cy="92" r="2" fill="#38bdf8"/>
    <circle cx="214" cy="312" r="2" fill="#22c55e"/>
    <circle cx="340" cy="98" r="2" fill="#a78bfa"/>
    <circle cx="940" cy="74" r="2" fill="#facc15"/>
    <circle cx="1116" cy="344" r="2" fill="#38bdf8"/>
    <circle cx="1224" cy="174" r="2" fill="#f97316"/>
  </g>

  <g transform="translate(640 214)" filter="url(#softGlow)">
    <circle r="82" fill="#111827" stroke="#fb923c" stroke-width="2.5"/>
    <circle r="61" fill="none" stroke="#f97316" stroke-width="1.4" opacity="0.75"/>
    <path d="M0 -100 L12 -80 L36 -86 L38 -62 L60 -52 L47 -32 L63 -11 L39 0 L42 25 L17 21 L0 42 L-17 21 L-42 25 L-39 0 L-63 -11 L-47 -32 L-60 -52 L-38 -62 L-36 -86 L-12 -80 Z" fill="url(#rustCore)" opacity="0.95"/>
    <text x="0" y="11" text-anchor="middle" class="mono" fill="#fff7ed" font-size="45" font-weight="800" letter-spacing="0">Rust</text>
    <text x="0" y="40" text-anchor="middle" class="mono" fill="#fed7aa" font-size="13" letter-spacing="0">center of gravity</text>
  </g>

  <g transform="translate(68 62)">
    <rect width="338" height="134" rx="10" fill="#08111f" stroke="url(#systemsGlow)" stroke-width="1.6"/>
    <text x="22" y="35" class="label sans">Industrial Systems</text>
    <text x="22" y="66" class="small mono">Linux · NixOS · Containers</text>
    <text x="22" y="92" class="small mono">CI/CD · Backend · Automation</text>
    <path d="M246 24 h48 v24 h-48 z M222 72 h84 v28 h-84 z" fill="none" stroke="#38bdf8" stroke-width="1.3" opacity="0.75"/>
    <circle cx="260" cy="112" r="4" fill="#8b5cf6"/>
    <circle cx="288" cy="112" r="4" fill="#38bdf8"/>
  </g>

  <g transform="translate(846 60)">
    <rect width="366" height="150" rx="10" fill="#10120d" stroke="url(#financeGlow)" stroke-width="1.8"/>
    <text x="22" y="36" class="label sans">Financial Engineering</text>
    <text x="22" y="68" class="small mono">time-series · PostgreSQL</text>
    <text x="22" y="94" class="small mono">TimescaleDB · Qdrant</text>
    <text x="22" y="120" class="small mono">decision infrastructure</text>
    <polyline points="236,108 262,84 288,96 314,48" fill="none" stroke="#facc15" stroke-width="3" opacity="0.9"/>
    <circle cx="236" cy="108" r="4" fill="#facc15"/>
    <circle cx="262" cy="84" r="4" fill="#f97316"/>
    <circle cx="288" cy="96" r="4" fill="#facc15"/>
    <circle cx="314" cy="48" r="4" fill="#f97316"/>
  </g>

  <g transform="translate(76 246)" filter="url(#softGlow)">
    <rect width="428" height="122" rx="12" fill="#061915" stroke="url(#bioGlow)" stroke-width="2.2"/>
    <text x="24" y="36" class="label sans" fill="#d1fae5">Bioinformatics Research</text>
    <text x="24" y="68" class="small mono">R · Python · RNA-seq · Bioconductor</text>
    <text x="24" y="94" class="small mono">pipelines · data visualization · publications</text>
    <path d="M314 25 C344 43 344 77 314 96 M358 25 C328 43 328 77 358 96" fill="none" stroke="#34d399" stroke-width="2.2"/>
    <path d="M320 43 H352 M320 60 H352 M320 77 H352" stroke="#38bdf8" stroke-width="1.4"/>
  </g>

  <g transform="translate(808 268)">
    <rect width="378" height="88" rx="10" fill="#0b1020" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="22" y="33" class="label sans">Open Source</text>
    <text x="22" y="62" class="small mono">burn · rfd · cargo-pgo</text>
    <circle cx="282" cy="42" r="6" fill="#f97316"/>
    <circle cx="312" cy="42" r="6" fill="#38bdf8"/>
    <circle cx="342" cy="42" r="6" fill="#22c55e"/>
  </g>

  <g transform="translate(424 28)">
    <text x="216" y="0" text-anchor="middle" class="sans" fill="#f8fafc" font-size="24" font-weight="800" letter-spacing="0">
      Industrial Systems / Bioinformatics Research / Financial Engineering
    </text>
    <text x="216" y="30" text-anchor="middle" class="mono muted" font-size="15" letter-spacing="0">
      open source · data infrastructure · reproducible engineering
    </text>
  </g>

  <g class="mono tiny">
    <text x="82" y="400">bioinformatist@github</text>
    <text x="1008" y="400">Rustacean / systems / research / infrastructure</text>
  </g>
</svg>
